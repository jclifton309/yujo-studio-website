<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yujo Studio — Bilingual Digital Agency | US & Japan Markets</title>
  <meta name="description" content="Yujo Studio is a full-service bilingual agency for B2B and DTC brands growing between the US and Japan. Native Japanese fluency. One team. Every service your brand needs." />
  <meta name="keywords" content="bilingual agency, US Japan marketing, DTC Japan, B2B Japan, Klaviyo, Shopify Japan, bilingual digital agency, Long Beach CA" />
  <meta property="og:title" content="Yujo Studio — Bilingual Digital Agency" />
  <meta property="og:description" content="Full-service bilingual agency for brands growing between the US and Japan. Native fluency. No handoffs. No gaps." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #F4F1ED;
      color: #111010;
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      line-height: 1.6;
      overflow-x: hidden;
    }
    :root {
      --red: #C0392B;
      --black: #111010;
      --off-white: #F4F1ED;
      --warm-mid: #E8E4DF;
      --muted: #6B6560;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'DM Sans', sans-serif;
    }
    ::selection { background: var(--red); color: #fff; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--off-white); }
    ::-webkit-scrollbar-thumb { background: var(--red); }

    /* Utility */
    .serif { font-family: var(--serif); }
    .red { color: var(--red); }

    /* Nav */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(244, 241, 237, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(17,16,16,0.08);
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 48px;
    }
    .nav-inner {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 0;
    }
    .logo {
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--black);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0;
      flex-shrink: 0;
      cursor: pointer;
    }
    .logo-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: var(--red);
      border-radius: 50%;
      margin: 0 5px;
      position: relative;
      top: -1px;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      margin: 0 auto;
      list-style: none;
      white-space: nowrap;
    }
    .nav-links a {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--black);
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .nav-links a:hover { opacity: 1; }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
    }
    .lang-toggle {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--black);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0;
      border: 1px solid rgba(17,16,16,0.2);
      overflow: hidden;
    }
    .lang-toggle span {
      padding: 6px 10px;
      transition: all 0.2s;
    }
    .lang-toggle span.active {
      background: var(--black);
      color: var(--off-white);
    }
    .lang-toggle span:not(.active):hover {
      background: rgba(17,16,16,0.06);
    }
    .btn-primary {
      background: var(--red);
      color: #fff;
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 9px 16px;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      text-decoration: none;
      display: inline-block;
      white-space: nowrap;
    }
    .btn-primary:hover { background: #a32d22; }
    .btn-secondary {
      background: transparent;
      color: var(--black);
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 10px 20px;
      border: 1px solid var(--black);
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .btn-secondary:hover { background: var(--black); color: var(--off-white); }

    /* Sections */
    section { width: 100%; }
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 48px;
    }

    /* Hero */
    .hero {
      padding-top: 64px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      border-bottom: 1px solid rgba(17,16,16,0.1);
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: 80px; right: -100px;
      width: 600px; height: 600px;
      background: radial-gradient(ellipse, rgba(192,57,43,0.04) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
      padding: 80px 0;
    }
    .hero-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .hero-eyebrow::before {
      content: '';
      display: block;
      width: 32px;
      height: 1px;
      background: var(--red);
    }
    .hero-headline {
      font-family: var(--serif);
      font-size: clamp(44px, 4.5vw, 68px);
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: -0.01em;
      color: var(--black);
      margin-bottom: 28px;
    }
    .hero-headline em {
      font-style: italic;
      color: var(--red);
    }
    .hero-sub {
      font-size: 16px;
      line-height: 1.7;
      color: var(--muted);
      max-width: 440px;
      margin-bottom: 40px;
    }
    .hero-ctas {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .hero-right {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    .hero-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .hero-tag {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 7px 14px;
      border: 1px solid rgba(17,16,16,0.2);
      color: var(--black);
      background: transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .hero-tag:hover { background: var(--black); color: var(--off-white); cursor: default; }
    .hero-tag.tag-red {
      border-color: var(--red);
      color: var(--red);
    }
    .hero-tag.tag-red:hover { background: var(--red); color: #fff; }
    .hero-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border: 1px solid rgba(17,16,16,0.12);
    }
    .stat {
      padding: 28px 24px;
      border-right: 1px solid rgba(17,16,16,0.12);
      border-bottom: 1px solid rgba(17,16,16,0.12);
    }
    .stat:nth-child(even) { border-right: none; }
    .stat:nth-child(3), .stat:nth-child(4) { border-bottom: none; }
    .stat-num {
      font-family: var(--serif);
      font-size: 42px;
      font-weight: 300;
      line-height: 1;
      color: var(--black);
      margin-bottom: 6px;
    }
    .stat-num span { color: var(--red); }
    .stat-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* Section label */
    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 16px;
    }

    /* Diff section */
    .diff-section {
      padding: 120px 0;
      border-bottom: 1px solid rgba(17,16,16,0.1);
    }
    .diff-header {
      margin-bottom: 60px;
    }
    .diff-title {
      font-family: var(--serif);
      font-size: clamp(36px, 3vw, 52px);
      font-weight: 400;
      line-height: 1.15;
      max-width: 480px;
    }
    .diff-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid rgba(17,16,16,0.12);
    }
    .diff-col {
      padding: 48px;
    }
    .diff-col:first-child {
      border-right: 1px solid rgba(17,16,16,0.12);
    }
    .diff-col-title {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 36px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .diff-col-title::before {
      content: '';
      display: block;
      width: 8px;
      height: 8px;
      background: var(--warm-mid);
      border: 1px solid rgba(17,16,16,0.2);
    }
    .diff-col.yujo .diff-col-title::before {
      background: var(--red);
      border-color: var(--red);
    }
    .diff-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .diff-item {
      padding: 18px 0;
      border-bottom: 1px solid rgba(17,16,16,0.08);
      font-size: 15px;
      line-height: 1.5;
      color: var(--muted);
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .diff-item:last-child { border-bottom: none; }
    .diff-col.yujo .diff-item { color: var(--black); }
    .diff-item-icon {
      font-size: 13px;
      flex-shrink: 0;
      margin-top: 2px;
      opacity: 0.4;
    }
    .diff-col.yujo .diff-item-icon { opacity: 1; color: var(--red); }

    /* Services */
    .services-section {
      padding: 120px 0;
      background: var(--black);
      color: var(--off-white);
      border-bottom: 1px solid rgba(244,241,237,0.08);
    }
    .services-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 60px;
    }
    .services-title {
      font-family: var(--serif);
      font-size: clamp(36px, 3vw, 52px);
      font-weight: 400;
      line-height: 1.15;
    }
    .services-label { color: rgba(244,241,237,0.4); }
    .services-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border: 1px solid rgba(244,241,237,0.1);
    }
    .service-card {
      padding: 40px 36px;
      border-right: 1px solid rgba(244,241,237,0.1);
      border-bottom: 1px solid rgba(244,241,237,0.1);
      position: relative;
    }
    .service-card:hover { background: rgba(244,241,237,0.04); }
    .service-card:nth-child(3n) { border-right: none; }
    .service-card:nth-child(4), .service-card:nth-child(5), .service-card:nth-child(6) { border-bottom: none; }
    .service-num {
      font-family: var(--serif);
      font-size: 13px;
      font-weight: 300;
      color: rgba(244,241,237,0.25);
      margin-bottom: 20px;
      letter-spacing: 0.1em;
    }
    .service-tag {
      position: absolute;
      top: 36px;
      right: 32px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 8px;
      background: var(--red);
      color: #fff;
    }
    .service-title {
      font-family: var(--serif);
      font-size: 24px;
      font-weight: 400;
      line-height: 1.2;
      margin-bottom: 12px;
      color: var(--off-white);
    }
    .service-desc {
      font-size: 13px;
      line-height: 1.65;
      color: rgba(244,241,237,0.45);
      margin-bottom: 24px;
    }
    .service-bullets {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .service-bullets li {
      font-size: 12px;
      color: rgba(244,241,237,0.55);
      display: flex;
      align-items: center;
      gap: 8px;
      line-height: 1.4;
    }
    .service-bullets li::before {
      content: '';
      display: block;
      width: 4px;
      height: 1px;
      background: var(--red);
      flex-shrink: 0;
    }

    /* Tech stack */
    .tech-section {
      padding: 80px 0;
      border-bottom: 1px solid rgba(17,16,16,0.1);
      overflow: hidden;
      background: var(--black);
    }
    .tech-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 40px;
      padding: 0 48px;
      max-width: 1280px;
      margin-left: auto;
      margin-right: auto;
    }
    .tech-header-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .tech-title {
      font-family: var(--serif);
      font-size: 32px;
      font-weight: 400;
      color: var(--off-white);
    }
    .tech-count {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(244,241,237,0.3);
    }
    @keyframes marquee {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }
    .tech-track-wrap {
      position: relative;
      overflow: hidden;
    }
    .tech-track-wrap::before,
    .tech-track-wrap::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      width: 120px;
      z-index: 2;
      pointer-events: none;
    }
    .tech-track-wrap::before {
      left: 0;
      background: linear-gradient(to right, var(--black), transparent);
    }
    .tech-track-wrap::after {
      right: 0;
      background: linear-gradient(to left, var(--black), transparent);
    }
    .tech-track {
      display: flex;
      gap: 0;
      animation: marquee 28s linear infinite;
      width: max-content;
    }
    .tech-track:hover { animation-play-state: paused; }
    .tech-track-row {
      display: flex;
      gap: 0;
    }
    .tech-pill {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 14px 28px;
      border-right: 1px solid rgba(244,241,237,0.08);
      border-top: 1px solid rgba(244,241,237,0.08);
      border-bottom: 1px solid rgba(244,241,237,0.08);
      color: rgba(244,241,237,0.4);
      background: transparent;
      transition: all 0.2s;
      cursor: default;
      white-space: nowrap;
    }
    .tech-pill:first-child { border-left: 1px solid rgba(244,241,237,0.08); }
    .tech-pill:hover {
      color: var(--off-white);
      background: rgba(244,241,237,0.04);
    }
    .tech-pill.featured {
      color: var(--red);
      border-color: rgba(192,57,43,0.3);
      background: rgba(192,57,43,0.06);
    }
    .tech-pill.featured:hover {
      background: rgba(192,57,43,0.12);
    }

    /* Who we work with */
    .who-section {
      padding: 120px 0;
      border-bottom: 1px solid rgba(17,16,16,0.1);
    }
    .who-header { margin-bottom: 60px; }
    .who-title {
      font-family: var(--serif);
      font-size: clamp(36px, 3vw, 52px);
      font-weight: 400;
      line-height: 1.15;
      max-width: 560px;
    }
    .who-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border: 1px solid rgba(17,16,16,0.12);
    }
    .who-col {
      border-right: 1px solid rgba(17,16,16,0.12);
    }
    .who-col:last-child { border-right: none; }
    .who-col-header {
      padding: 28px 36px;
      border-bottom: 1px solid rgba(17,16,16,0.12);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .who-col-header.b2b { background: var(--black); color: var(--off-white); }
    .who-col-header.dtc { background: var(--red); color: #fff; }
    .who-col-header.expansion { background: var(--warm-mid); color: var(--black); }
    .who-col-body {
      padding: 36px;
    }
    .who-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .who-item {
      padding: 14px 0;
      border-bottom: 1px solid rgba(17,16,16,0.07);
      font-size: 14px;
      line-height: 1.5;
      color: var(--black);
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .who-item:last-child { border-bottom: none; }
    .who-item::before {
      content: '';
      display: block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--black);
      flex-shrink: 0;
      margin-top: 7px;
    }

    /* Process */
    .process-section {
      padding: 120px 0;
      background: var(--warm-mid);
      border-bottom: 1px solid rgba(17,16,16,0.1);
    }
    .process-header { margin-bottom: 60px; }
    .process-title {
      font-family: var(--serif);
      font-size: clamp(36px, 3vw, 52px);
      font-weight: 400;
      line-height: 1.15;
      max-width: 400px;
    }
    .process-steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      border: 1px solid rgba(17,16,16,0.12);
      background: var(--off-white);
    }
    .process-step {
      padding: 48px 40px;
      border-right: 1px solid rgba(17,16,16,0.12);
      position: relative;
    }
    .process-step:last-child { border-right: none; }
    .step-num {
      font-family: var(--serif);
      font-size: 72px;
      font-weight: 300;
      color: rgba(17,16,16,0.06);
      line-height: 1;
      margin-bottom: 24px;
    }
    .step-title {
      font-family: var(--serif);
      font-size: 26px;
      font-weight: 400;
      line-height: 1.2;
      margin-bottom: 12px;
    }
    .step-desc {
      font-size: 14px;
      line-height: 1.7;
      color: var(--muted);
    }
    .step-connector {
      position: absolute;
      top: 48px;
      right: -16px;
      width: 32px;
      height: 32px;
      background: var(--red);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 11px;
      z-index: 1;
    }

    /* Contact Form */
    .contact-section {
      padding: 120px 0;
      background: var(--off-white);
      border-top: 1px solid rgba(17,16,16,0.1);
    }
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: start;
    }
    .contact-left {}
    .contact-title {
      font-family: var(--serif);
      font-size: clamp(36px, 3vw, 52px);
      font-weight: 400;
      line-height: 1.15;
      margin-bottom: 20px;
    }
    .contact-title em { font-style: italic; color: var(--red); }
    .contact-desc {
      font-size: 15px;
      line-height: 1.7;
      color: var(--muted);
      margin-bottom: 40px;
      max-width: 360px;
    }
    .contact-detail {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .contact-detail-item {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--black);
    }
    .contact-detail-item span:first-child {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      width: 60px;
      flex-shrink: 0;
    }
    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 0;
      border: 1px solid rgba(17,16,16,0.12);
      background: white;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid rgba(17,16,16,0.08);
    }
    .form-row.single {
      grid-template-columns: 1fr;
    }
    .form-field {
      display: flex;
      flex-direction: column;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

        els.forEach(el => obs.observe(el));
        return () => obs.disconnect();

                      t("Deep B2B expertise with an understanding of Japanese business culture", "日本のビジネス文化を理解した深いB2B専門知識"),
                      t("One point of contact. Total alignment.", "一つの窓口。完全な連携。")
                    ].map((item, i) => (
                      <li key={i} className="diff-item">
                        <span className="diff-item-icon" style={{color:'var(--red)'}}>✓</span>
                        <span>{item}</span>
                      </li>
                    ))}
                  </ul>
                </div>
              </div>
              </div>
            </div>
          </section>

          {/* SERVICES */}
          <section className="services-section" id="services">
            <div className="container">
              <div className="services-header">
                <div>
                  <div className="section-label services-label">{t("What We Do", "サービス内容")}</div>
                  <h2 className="services-title">{t("Full-service, fully bilingual.", "フルサービス、完全バイリンガル。")}</h2>
                </div>
              </div>
              <div className="services-grid">
                {services.map((s, i) => (
                  <div key={i} className="service-card">
                    {s.tag && <div className="service-tag">{s.tag}</div>}
                    <div style={{marginBottom:'16px'}}>{serviceIcons[i]}</div>
                    <h3 className="service-title">{t(s.title, s.title)}</h3>
                    <p className="service-desc">{s.desc}</p>
                    <ul className="service-bullets">
                      {s.bullets.map((b, j) => <li key={j}>{b}</li>)}
                    </ul>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* TECH STACK */}
          <section className="tech-section">
            <div className="tech-header">
              <div className="tech-header-left">
                <div className="section-label" style={{color:'rgba(244,241,237,0.35)',marginBottom:0}}>{t("Tech Stack","使用ツール")}</div>
                <h3 className="tech-title">{t("Tools we work with","使用するツール")}</h3>
              </div>
              <div style={{textAlign:'right'}}>
                <div className="tech-count">{techStack.length} platforms &amp; tools</div>
                <div style={{fontSize:'13px',color:'rgba(244,241,237,0.45)',marginTop:'6px',maxWidth:'280px',lineHeight:'1.5'}}>
                  {t("Already on something else? We work with your stack too.", "別のツールをお使いですか？御社のスタックにも対応します。")}
                </div>
              </div>
            </div>
            <div className="tech-track-wrap">
              <div className="tech-track">
                {[...techStack,...techStack].map((t2,i) => (
                  <div key={i} className={`tech-pill${t2.featured?' featured':''}`}>{t2.name}</div>
                ))}
              </div>
            </div>
          </section>

          {/* OUR WORK */}
          <section className="work-section" id="work">
            <div className="container">
              <div className="work-header reveal">
                <div className="section-label">{t("Our Work", "実績")}</div>
                <h2 className="work-title">{t("Results that speak for themselves.", "実績が語る成果。")}</h2>
              </div>
              <div className="work-grid">
                {caseStudies.map((c, i) => (
                  <div key={i} className={`work-card reveal reveal-delay-${i+1}`}>
                    <div className="work-meta">
                      {c.tags.map((tag,j) => <span key={j} className={`work-tag${j===0?' red':''}`}>{tag}</span>)}
                      <span className="work-market">{c.market}</span>
                    </div>
                    <div className="work-client">{t(c.client, c.client)}</div>
                    <div className="work-desc">{c.desc}</div>
                    <div className="work-result">
                      <div className="work-result-num">{c.resultNum}</div>
                      <div className="work-result-label" style={{whiteSpace:'pre-line'}}>{c.resultLabel}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* TESTIMONIALS */}
          <section className="testimonials-section">
            <div className="container">
              <div className="section-label reveal" style={{color:'rgba(244,241,237,0.35)',marginBottom:'40px'}}>{t("What Clients Say", "クライアントの声")}</div>
              <div className="testimonials-inner">
                {testimonials.map((t2, i) => (
                  <div key={i} className={`testimonial-card reveal reveal-delay-${i+1}`}>
                    <div className="testimonial-quote-mark">&ldquo;</div>
                    <div className="testimonial-text">{t2.text}</div>
                    <div className="testimonial-attr">
                      <div className="testimonial-name">{t2.name}</div>
                      <div className="testimonial-role">{t2.role}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* PROCESS */}
          <section className="process-section">
            <div className="container">
              <div className="process-header">
                <div className="section-label">{t("How It Works", "進め方")}</div>
                <h2 className="process-title">{t("Simple process. Serious results.", "シンプルなプロセス。確かな成果。")}</h2>
              </div>
              <div className="process-steps">
                {[
                  { num: "01", title: t("Free Discovery Call", "無料ディスカバリーコール"), desc: t("We learn your brand, goals, and the markets you're targeting. No fluff — just an honest conversation about where you are and where you want to go.", "ブランド、目標、ターゲット市場についてお聞きします。正直な会話から始めます。") },
                  { num: "02", title: t("Strategy & Scope", "戦略とスコープ"), desc: t("We build a clear plan with defined deliverables, timelines, and a budget that makes sense for your stage. You know exactly what you're getting.", "明確な成果物、スケジュール、予算を含む計画を策定します。") },
                  { num: "03", title: t("Execution & Growth", "実行と成長"), desc: t("We get to work. One team, two markets, every service aligned. You see results — and you stay in the loop at every step.", "ひとつのチームが両市場に向けて動き出します。すべてのサービスが連携し、成果を生み出します。") }
                ].map((step, i) => (
                  <div key={i} className="process-step">
                    <div className="step-num">{step.num}</div>
                    <h3 className="step-title">{step.title}</h3>
                    <p className="step-desc">{step.desc}</p>
                    {i < 2 && <div className="step-connector">→</div>}
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* PRICING */}
          <section className="pricing-section" id="pricing">
            <div className="container">
              <div className="pricing-header reveal">
                <div className="section-label">{t("How We Work Together", "料金・契約形態")}</div>
                <h2 className="pricing-title">{t("Flexible engagements.", "柔軟な契約形態。")}</h2>
                <p className="pricing-sub">{t("Every brand is different. We scope to what you actually need — not a one-size-fits-all package. All engagements include bilingual delivery.", "すべてのブランドは異なります。必要なものに合わせてスコープします。")}</p>
              </div>
              <div className="pricing-grid">
                {pricingTiers.map((p, i) => (
                  <div key={i} className={`pricing-card reveal reveal-delay-${i+1}${p.featured?' featured':''}`}>
                    {p.badge && <div className="pricing-badge">{p.badge}</div>}
                    <div className="pricing-tier">{p.tier}</div>
                    <div className="pricing-name">{t(p.name, p.name)}</div>
                    <div className="pricing-desc">{p.desc}</div>
                    <ul className="pricing-features">
                      {p.features.map((f,j) => <li key={j}>{f}</li>)}
                    </ul>
                    <div className="pricing-cta-label">{t("Ready to start?", "始める準備は？")}</div>
                    <a href="#contact" className={p.featured ? 'btn-primary' : 'btn-secondary'} style={{marginTop:'8px',textAlign:'center'}}>{t(p.cta, p.cta)}</a>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* FAQ */}
          <section className="faq-section" id="faq">
            <div className="container">
              <div className="faq-header reveal">
                <div className="section-label">{t("Common Questions", "よくある質問")}</div>
                <h2 className="faq-title">{t("Everything you need to know.", "知っておくべきこと。")}</h2>
              </div>
              <div className="faq-grid">
                {faqs.map((f, i) => <FAQItem key={i} q={t(f.q, f.q)} a={t(f.a, f.a)} />)}
              </div>
            </div>
          </section>

          {/* CTA BAND */}
          <section className="cta-band">
            <div className="container" style={{position:'relative',overflow:'hidden'}}>
              <svg viewBox="0 0 400 400" fill="none" style={{position:'absolute',right:'-80px',top:'50%',transform:'translateY(-50%)',width:'380px',opacity:0.06,pointerEvents:'none'}}>
                <circle cx="200" cy="200" r="190" stroke="white" strokeWidth="1.5"/>
                <circle cx="200" cy="200" r="140" stroke="white" strokeWidth="1"/>
                <circle cx="200" cy="200" r="90" stroke="#C0392B" strokeWidth="2"/>
                <circle cx="200" cy="200" r="40" stroke="white" strokeWidth="1"/>
                <line x1="10" y1="200" x2="390" y2="200" stroke="white" strokeWidth="0.75"/>
                <line x1="200" y1="10" x2="200" y2="390" stroke="white" strokeWidth="0.75"/>
                <circle cx="200" cy="200" r="5" fill="#C0392B"/>
              </svg>
              <div className="cta-band-inner">
                <h2 className="cta-headline">
                  {t(
                    <><em>B2B or DTC, US or Japan</em> — let's figure out what growth looks like for your brand.</>,
                    <><em>B2BでもDTCでも、米国でも日本でも</em> — あなたのブランドの成長を一緒に考えましょう。</>
                  )}
                </h2>
                <button className="btn-primary-light" onClick={()=>document.getElementById('contact').scrollIntoView({behavior:'smooth'})}>{t("Get Started", "お問い合わせ")}</button>
              </div>
            </div>
          </section>

          {/* CONTACT FORM */}
          <section className="contact-section" id="contact">
            <div className="container">
              <div className="section-label" style={{marginBottom:'16px'}}>{t("Get In Touch", "お問い合わせ")}</div>
              <div className="contact-grid">
                <div className="contact-left">
                  <h2 className="contact-title">
                    {t(<>Let's talk about<br /><em>your brand.</em></>, <>あなたのブランドについて<br /><em>話しましょう。</em></>)}
                  </h2>
                  <p className="contact-desc">
                    {t(
                      "Tell us a bit about where you are and what you're trying to build. We'll get back to you within one business day.",
                      "現在の状況と目標を教えてください。1営業日以内にご連絡いたします。"
                    )}
                  </p>
                  <div className="contact-detail">
                    <div className="contact-detail-item">
                      <span>Email</span>
                      <span>hello@yujo.studio</span>
                    </div>
                    <div className="contact-detail-item">
                      <span>Based</span>
                      <span>Long Beach, CA · US &amp; Japan</span>
                    </div>
                    <div className="contact-detail-item">
                      <span>Response</span>
                      <span>Within 1 business day</span>
                    </div>
                  </div>
                </div>
                <ContactForm t={t} />
              </div>
            </div>
          </section>

          {/* FOOTER */}
          <footer>
            <div className="container">
              <div className="footer-inner">
                <div>
                  <div className="footer-logo">
                    Yujo<span className="logo-dot"></span>Studio
                  </div>
                  <div className="footer-location">
                    Long Beach, CA · US &amp; Japan
                  </div>
                </div>
                <a href="mailto:hello@yujo.studio" className="footer-email">hello@yujo.studio</a>
                <div className="footer-copy">© 2026 Yujo Studio. All rights reserved.</div>
              </div>
            </div>
          </footer>

          <TweaksPanel>
            <TweakSection label="Copy" />
            <TweakText label="Headline" value={tweaks.heroHeadline}
              onChange={v => setTweak('heroHeadline', v)} />
            <TweakText label="Subheadline" value={tweaks.heroSub}
              onChange={v => setTweak('heroSub', v)} />
            <TweakSection label="Colors" />
            <TweakColor label="Accent" value={tweaks.accentColor}
              onChange={v => setTweak('accentColor', v)} />
            <TweakColor label="Background" value={tweaks.bgColor}
              onChange={v => setTweak('bgColor', v)} />
            <TweakColor label="Dark BG" value={tweaks.darkBg}
              onChange={v => setTweak('darkBg', v)} />
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
